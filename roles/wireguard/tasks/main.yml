---
- name: Install WireGuard and network tools
  ansible.builtin.apt:
    name:
      - iproute2
      - wireguard
      - wireguard-tools
    state: present
    update_cache: true

# Prepare Systemd-Networkd

- name: Create systemd-networkd configuration directory
  ansible.builtin.file:
    path: /etc/systemd/network
    state: directory
    owner: root
    group: root
    mode: "0755"

# WireGuard

## Generate Private Key

- name: Store WireGuard Private Key
  ansible.builtin.copy:
    content: "{{ wireguard_private_key }}\n"
    dest: "/etc/systemd/network/{{ wireguard_interface }}.key"
    owner: root
    group: root
    mode: "0600"

- name: Store Wireguard Public Key
  ansible.builtin.copy:
    content: "{{ wireguard_public_key }}\n"
    dest: "/etc/systemd/network/{{ wireguard_interface }}.pub"
    owner: root
    group: root
    mode: "0600"

- name: Store Wireguard Pre Shared Key Seed
  ansible.builtin.copy:
    content: "{{ wireguard_psk_seed }}\n"
    dest: "/etc/systemd/network/{{ wireguard_interface }}.psk.seed"
    owner: root
    group: root
    mode: "0600"

- name: Configure WireGuard netdev
  ansible.builtin.template:
    src: wireguard.netdev.j2
    dest: "/etc/systemd/network/10-{{ wireguard_interface }}.netdev"
    owner: root
    group: root
    mode: "0600"

- name: Configure WireGuard network
  ansible.builtin.template:
    src: wireguard.network.j2
    dest: "/etc/systemd/network/10-{{ wireguard_interface }}.network"
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd-networkd configuration
  ansible.builtin.command:
    cmd: networkctl reload
  changed_when: true

- name: Bring up WireGuard interface
  ansible.builtin.command:
    cmd: "networkctl up {{ wireguard_interface }}"
  changed_when: true
