---
- name: Install network tools
  ansible.builtin.apt:
    name:
      - iproute2
    state: present
    update_cache: true

- name: Create systemd-networkd configuration directory
  ansible.builtin.file:
    path: /etc/systemd/network
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure GRE netdev
  ansible.builtin.template:
    src: gre.netdev.j2
    dest: "/etc/systemd/network/20-{{ gre_interface }}.netdev"
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-networkd

- name: Configure GRE network
  ansible.builtin.template:
    src: gre.network.j2
    dest: "/etc/systemd/network/20-{{ gre_interface }}.network"
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-networkd

- name: Enable systemd-networkd
  ansible.builtin.systemd:
    name: systemd-networkd
    enabled: true
    state: started
    daemon_reload: true
